<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background fills full square (required for maskable purpose) -->
  <rect width="512" height="512" fill="#0f172a"/>
  <!-- Subtle border ring -->
  <rect x="16" y="16" width="480" height="480" rx="72" fill="none" stroke="#1e3a5f" stroke-width="8"/>
  <!-- "MT" logotype -->
  <text
    x="256"
    y="330"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="220"
    font-weight="900"
    fill="#60a5fa"
    text-anchor="middle"
    letter-spacing="-8"
  >MT</text>
  <!-- Subtitle -->
  <text
    x="256"
    y="400"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="52"
    font-weight="500"
    fill="#475569"
    text-anchor="middle"
    letter-spacing="8"
  >TRACKER</text>
</svg>
